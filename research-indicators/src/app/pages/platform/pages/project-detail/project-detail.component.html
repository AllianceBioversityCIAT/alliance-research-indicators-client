<div class="flex h-full min-w-0 flex-col">
  <div class="w-full min-w-0 pt-[8px] sm:pt-[12px] bg-white md:pt-[20px]">
    <div class="mb-4 px-[24px] md:px-[28px] py-[9px]">
      <div class="font-['Barlow'] text-[15px] font-normal leading-[18px] text-[#8D9299]">
        {{ currentProject().agreement_id || contractId() }}
      </div>
      <span class="m-0 mt-1 font-['Barlow'] text-[18px] font-semibold leading-[20px] text-[#112F5C]">
        {{ projectTitle() }}
      </span>
    </div>

    <div class="flex items-end gap-0 px-2 border-b border-[#E8EBED]">
      @for (tab of tabs(); track tab.route) {
      <button type="button"
        class="flex cursor-pointer items-center border-b-2 border-transparent px-5 py-3 transition-all duration-200 hover:bg-white/60"
        [class.!border-b-[#035BA9]]="lastSegment() === tab.route" [class.-mb-px]="lastSegment() === tab.route"
        [class.bg-white]="lastSegment() === tab.route" (click)="onTabClick(tab)">
        <span class="font-['Barlow'] text-[14px] font-semibold leading-none transition-colors duration-200"
          [class.text-[#035BA9]]="lastSegment() === tab.route" [class.text-[#8D9299]]="lastSegment() !== tab.route">
          {{ tab.label }}
        </span>
      </button>
      }
    </div>

    <div class="overflow-hidden border border-t-0 border-[#E8EBED] bg-[#f5f5f5]">
      <div class="w-full overflow-x-auto p-4" [class.p-0]="lastSegment() === 'project-results'">
        @if (lastSegment() === 'project-results') {
        <div class="w-full !rounded-lg bg-white border border-[#E8EBED] border-b-0 border-l-0 border-r-0 pt-1">
          <div class="border-b border-[#E8EBED] bg-white px-5 pb-3 pt-5 md:px-6 md:py-[18px]">
            <app-project-indicator-filters [project]="currentProject()" [enableFilter]="true"
              (indicatorClick)="onIndicatorClick($event)"></app-project-indicator-filters>
          </div>
          <app-results-center-table [showNewProjectResultButton]="true"
            [roundedBottom]="true"></app-results-center-table>
        </div>
        } @else {
        <router-outlet />
        }
      </div>
    </div>
  </div>
</div>

<app-section-sidebar [title]="'Table Filters'" [description]="'Filter your table data by applying custom criteria.'"
  [showSignal]="this.resultsCenterService.showFiltersSidebar" confirmText="Apply filters"
  (confirm)="this.resultsCenterService.applyFilters()">
  <app-table-filters-sidebar [hideProjectFilter]="true"></app-table-filters-sidebar>
</app-section-sidebar>

<app-section-sidebar [title]="'Table Configuration'"
  [description]="'Customize your table by enabling, disabling, or reordering columns.'"
  [showSignal]="this.resultsCenterService.showConfigurationsSidebar" confirmText="Save table settings"
  (confirm)="sidebarConfigurations.applyConfigurations()">
  <app-table-configuration #sidebarConfigurations
    [excludedColumns]="['Platform', 'Reporting Project', 'Primary Lever']"></app-table-configuration>
</app-section-sidebar>
