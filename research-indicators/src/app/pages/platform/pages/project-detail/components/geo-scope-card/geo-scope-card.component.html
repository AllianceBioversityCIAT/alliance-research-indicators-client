<app-project-dashboard-card title="Geographic scope"
  description="Distribution of geographic reach for results linked to this primary contract." iconClass="pi pi-globe"
  [compact]="true" [loading]="service.loading()" [error]="service.loadError()" [empty]="isEmpty()"
  emptyMessage="No geographic scope data was found for this project." (retry)="service.update()">
  <div class="flex flex-col gap-3">
    <div class="grid grid-cols-1 items-start gap-3 lg:grid-cols-[minmax(220px,280px)_minmax(0,1fr)] lg:items-center">
      @if (donutTotal() > 0) {
      <div class="grid grid-cols-[auto_1fr] items-center gap-3 rounded-[10px] bg-[#F4F7F9] p-2.5 md:max-lg:justify-items-center">
        <div class="flex h-[88px] w-[88px] shrink-0 items-center justify-center rounded-full"
          [style.background]="donutGradient()">
          <div
            class="flex h-[54px] w-[54px] flex-col items-center justify-center rounded-full bg-white shadow-[0_0_0_1px_#E8EBED]">
            <strong class="font-['Barlow'] text-lg leading-none text-[#112F5C]">{{ donutTotal() }}</strong>
            <span class="mt-1 font-['Barlow'] text-[11px] uppercase tracking-[0.04em] text-[#777C83]">Results</span>
          </div>
        </div>

        <ul class="m-0 flex min-w-0 list-none flex-col gap-1.5 p-0">
          @for (segment of donutSegments(); track segment.key) {
          <li class="grid grid-cols-[auto_1fr_auto] items-center gap-2">
            <span class="h-2.5 w-2.5 rounded-full" [style.background-color]="segment.color"></span>
            <span class="truncate font-['Barlow'] text-xs text-[#4C5158]">{{ segment.label }}</span>
            <span class="font-['Barlow'] text-[13px] font-bold tabular-nums text-[#112F5C]">{{ segment.value }}</span>
          </li>
          }
        </ul>
      </div>
      }

      <div class="min-w-0">
        <app-geo-scope-map [countries]="service.topCountries()"></app-geo-scope-map>
      </div>
    </div>

    @if (topRegions().length) {
    <div class="pt-1">
      <h3 class="mb-2 mt-0 font-['Barlow'] text-xs font-semibold uppercase tracking-[0.04em] text-[#112F5C]">Top
        regions</h3>
      <app-project-dashboard-card variant="list" [items]="topRegions()" layout="rows"></app-project-dashboard-card>
    </div>
    }
  </div>
</app-project-dashboard-card>
