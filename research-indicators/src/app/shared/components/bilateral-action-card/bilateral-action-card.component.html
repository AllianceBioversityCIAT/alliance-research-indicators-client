<div role="region"
     [attr.aria-labelledby]="titleId"
     class="bilateral-action-card flex items-center gap-4 bg-[#fcfcfc] border border-[var(--ac-grey-300)] rounded-[10px] p-[20px]"
     data-testid="bilateral-action-card">

  <div class="bilateral-action-card__illustration shrink-0 flex items-center justify-center"
       aria-hidden="true"
       data-testid="bilateral-action-card-illustration">
    @if (illustration) {
      <img [src]="illustration" alt="" class="w-[73px] h-[73px] object-contain" />
    } @else {
      <i class="pi pi-sparkles text-[40px]" style="color: var(--ac-primary-blue-400);"></i>
    }
  </div>

  <div class="bilateral-action-card__copy flex flex-col flex-1 gap-1 min-w-0">
    <h3 [id]="titleId"
        class="bilateral-action-card__title m-0 tracking-wider uppercase"
        data-testid="bilateral-action-card-title">{{ title }}</h3>
    <p class="bilateral-action-card__body m-0"
       data-testid="bilateral-action-card-body">{{ body }}</p>
  </div>

  <div class="bilateral-action-card__cta-wrap shrink-0">
    <p-button [label]="ctaLabel"
              [icon]="ctaIcon"
              [disabled]="disabled"
              severity="success"
              [attr.aria-label]="ctaAriaLabel"
              (onClick)="onCtaClick()"
              data-testid="bilateral-action-card-cta">
    </p-button>
  </div>
</div>
